# =============================================================================
# ATS – CI Pipeline
# Localização: .github/workflows/ci.yml
# =============================================================================

name: CI

on:
  push:                          # dispara em qualquer branch
    branches-ignore:
      - 'dependabot/**'          # ignora PRs automáticos de bots
  pull_request:                  # dispara em PRs para qualquer alvo
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: '10.0.x'       # alinhado com net10.0 dos .csproj
  COVERAGE_THRESHOLD: '30'

permissions:
  contents: read
  checks: write
  pull-requests: write

# =============================================================================
# JOB 1 – BUILD
# =============================================================================
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # Suporta tanto .slnx (novo formato .NET 9+) quanto .sln (formato clássico)
      - name: Locate solution file
        run: |
          SLN=$(find . \( -name "*.slnx" -o -name "*.sln" \) -maxdepth 4 | head -1)
          if [ -z "$SLN" ]; then
            echo "Nenhum arquivo .sln / .slnx encontrado. Estrutura atual:"
            find . -maxdepth 3 -not -path '*/.git/*' -not -path '*/bin/*' -not -path '*/obj/*' | sort
            exit 1
          fi
          echo "Solução encontrada: $SLN"
          echo "SOLUTION=$SLN" >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (warnings como erros)
        run: |
          dotnet build ${{ env.SOLUTION }} \
            --no-restore \
            -c Release \
            /p:TreatWarningsAsErrors=true

# =============================================================================
# JOB 2 – UNIT TESTS & COVERAGE
# =============================================================================
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Locate solution file
        run: |
          SLN=$(find . \( -name "*.slnx" -o -name "*.sln" \) -maxdepth 4 | head -1)
          if [ -z "$SLN" ]; then
            echo "Nenhum arquivo .sln / .slnx encontrado."
            exit 1
          fi
          echo "Solução encontrada: $SLN"
          echo "SOLUTION=$SLN" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      - name: Run unit tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName!~Integration" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=GeneratedCodeAttribute \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Program.cs,**/Shared/**,**/I*.cs,**/*Command.cs,**/*Dto.cs,**/*Injection.cs,**/*Map.cs,**/*Request.cs" \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]*.Shared.*"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Html;Badges;TextSummary"

      - name: Enforce coverage threshold (${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          python3 << 'EOF'
          import glob, xml.etree.ElementTree as ET, sys, os

          files = glob.glob('./TestResults/**/coverage.cobertura.xml', recursive=True)
          if not files:
              print('Nenhum arquivo de cobertura encontrado.')
              sys.exit(1)

          total_valid = total_covered = 0
          for f in files:
              root = ET.parse(f).getroot()
              total_valid   += int(root.get('lines-valid',   '0'))
              total_covered += int(root.get('lines-covered', '0'))

          if total_valid == 0:
              print('Nenhuma linha mensurável encontrada.')
              sys.exit(1)

          coverage  = (total_covered / total_valid) * 100
          threshold = int(os.environ.get('COVERAGE_THRESHOLD', '30'))

          print(f'Cobertura de linhas: {coverage:.1f}%  ({total_covered}/{total_valid} linhas)')

          if coverage < threshold:
              print(f'FALHA: cobertura {coverage:.1f}% abaixo do limite mínimo de {threshold}%')
              sys.exit(1)

          print(f'OK: cobertura {coverage:.1f}% >= {threshold}%')
          EOF

      - name: Write coverage summary
        if: always()
        run: |
          echo "## Cobertura de Código" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat ./coverage-report/Summary.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage-report/
          retention-days: 7

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

# =============================================================================
# JOB 3 – CODE QUALITY
# =============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Locate solution file
        run: |
          SLN=$(find . \( -name "*.slnx" -o -name "*.sln" \) -maxdepth 4 | head -1)
          if [ -z "$SLN" ]; then
            echo "Nenhum arquivo .sln / .slnx encontrado."
            exit 1
          fi
          echo "Solução encontrada: $SLN"
          echo "SOLUTION=$SLN" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Check code formatting
        run: |
          dotnet format ${{ env.SOLUTION }} \
            --verify-no-changes \
            --verbosity diagnostic

      - name: Audit for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "Pacotes vulneráveis detectados:"
            cat vuln.txt
            exit 1
          fi
          echo "Nenhuma vulnerabilidade conhecida encontrada."

      - name: Write quality summary
        if: always()
        run: |
          echo "## Qualidade de Código" >> $GITHUB_STEP_SUMMARY
          echo "- Formatação: verificada via \`dotnet format\`" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerabilidades: verificadas via \`dotnet list package --vulnerable\`" >> $GITHUB_STEP_SUMMARY