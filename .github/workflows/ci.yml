# =============================================================================
# ATS – CI Pipeline
# Localização: .github/workflows/ci.yml
#
# Dispara em:
#   • push para main e develop
#   • pull_request direcionado a main e develop
#
# Jobs:
#   1. build        → restaura pacotes e compila (warnings = erros)
#   2. unit-tests   → executa xUnit, coleta cobertura, valida threshold
#   3. code-quality → verifica formatação e audita vulnerabilidades
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Cancela runs duplicadas no mesmo branch/PR (não cancela em main)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: 'ATS.sln'
  COVERAGE_THRESHOLD: '70'             # % mínimo de cobertura de linhas

permissions:
  contents: read
  checks: write                        # necessário para o test-reporter comentar no PR
  pull-requests: write

# =============================================================================
# JOB 1 – BUILD
# Gate obrigatório: os outros jobs só iniciam se este passar.
# =============================================================================
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (warnings como erros)
        run: |
          dotnet build ${{ env.SOLUTION }} \
            --no-restore \
            -c Release \
            /p:TreatWarningsAsErrors=true

# =============================================================================
# JOB 2 – UNIT TESTS & COVERAGE
# Roda em paralelo com o job code-quality após o build.
# =============================================================================
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release

      # Executa apenas testes unitários (exclui qualquer classe marcada com "Integration")
      - name: Run unit tests
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName!~Integration" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=GeneratedCodeAttribute \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Program.cs"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      # Gera relatório HTML (baixável como artefato) + TextSummary para o log
      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./TestResults/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Html;Badges;TextSummary"

      # Lê o XML do coverlet e falha se a cobertura estiver abaixo do threshold
      - name: Enforce coverage threshold (${{ env.COVERAGE_THRESHOLD }}%)
        run: |
          python3 << 'EOF'
          import glob, xml.etree.ElementTree as ET, sys

          files = glob.glob('./TestResults/**/coverage.cobertura.xml', recursive=True)
          if not files:
              print('Nenhum arquivo de cobertura encontrado.')
              sys.exit(1)

          total_valid = total_covered = 0
          for f in files:
              root = ET.parse(f).getroot()
              total_valid   += int(root.get('lines-valid',   '0'))
              total_covered += int(root.get('lines-covered', '0'))

          if total_valid == 0:
              print('Nenhuma linha mensurável encontrada.')
              sys.exit(1)

          coverage  = (total_covered / total_valid) * 100
          threshold = ${{ env.COVERAGE_THRESHOLD }}

          print(f'Cobertura de linhas: {coverage:.1f}%  ({total_covered}/{total_valid} linhas)')

          if coverage < threshold:
              print(f'FALHA: cobertura {coverage:.1f}% abaixo do limite mínimo de {threshold}%')
              sys.exit(1)

          print(f'OK: cobertura {coverage:.1f}% >= {threshold}%')
          EOF

      # Exibe resumo de cobertura diretamente na aba "Summary" do run
      - name: Write coverage summary
        if: always()
        run: |
          echo "## Cobertura de Código" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat ./coverage-report/Summary.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage-report/
          retention-days: 7

      # Publica resultados dos testes como comentário no PR
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Test Results
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

# =============================================================================
# JOB 3 – CODE QUALITY
# Roda em paralelo com unit-tests após o build.
# =============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Falha se qualquer arquivo divergir das regras do .editorconfig
      - name: Check code formatting
        run: |
          dotnet format ${{ env.SOLUTION }} \
            --verify-no-changes \
            --verbosity diagnostic

      # Lista pacotes com CVEs conhecidos; falha se encontrar algum
      - name: Audit for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "Pacotes vulneráveis detectados:"
            cat vuln.txt
            exit 1
          fi
          echo "Nenhuma vulnerabilidade conhecida encontrada."

      - name: Write quality summary
        if: always()
        run: |
          echo "## Qualidade de Código" >> $GITHUB_STEP_SUMMARY
          echo "- Formatação: verificada via \`dotnet format\`" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerabilidades: verificadas via \`dotnet list package --vulnerable\`" >> $GITHUB_STEP_SUMMARY