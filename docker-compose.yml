services:
  api:
    build:
      context: .
      dockerfile: src/ATS.API/Dockerfile
    container_name: ats-api
    restart: unless-stopped
    ports:
      - "${API_HTTP_PORT:-5031}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__DatabaseName: ${MONGO_DATABASE_NAME:-AtsDbLocal}
      MongoDB__MaxConnectionPoolSize: ${MONGO_MAX_CONNECTION_POOL_SIZE:-50}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ats-network

  mongo:
    image: mongo:7.0
    container_name: ats-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ats-network

  mongo-express:
    image: mongo-express:latest
    container_name: ats-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ats-network
    profiles:
      - tools

volumes:
  mongo-data:

networks:
  ats-network:
    driver: bridge
