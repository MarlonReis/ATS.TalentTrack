services:
  api:
    build:
      context: .
      dockerfile: src/ATS.API/Dockerfile
    container_name: ats-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_HTTP_PORT:-5031}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      MongoDB__ConnectionString: mongodb://${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongo:27017
      MongoDB__DatabaseName: ${MONGO_DATABASE_NAME:-AtsDb}
      MongoDB__MaxConnectionPoolSize: ${MONGO_MAX_CONNECTION_POOL_SIZE:-100}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-}
      Observability__ServiceName: ${OTEL_SERVICE_NAME:-ats-api}
      Observability__OtlpEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      Observability__EnablePrometheusEndpoint: "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ats-network
    read_only: true
    tmpfs:
      - /tmp

  mongo:
    image: mongo:7.0
    container_name: ats-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ats-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: ats-mongo-express
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:?MONGO_EXPRESS_USERNAME is required}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:?MONGO_EXPRESS_PASSWORD is required}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ats-network
    profiles:
      - tools

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: ats-jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JAEGER_UI_PORT:-16686}:16686"
      - "127.0.0.1:${JAEGER_OTLP_PORT:-4317}:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ats-network
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ats-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ats-network
    profiles:
      - observability

volumes:
  mongo-data:
  prometheus-data:

networks:
  ats-network:
    driver: bridge
